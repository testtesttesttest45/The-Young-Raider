<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />

        <title id="page-title">Raider Profile</title>

        <link
            rel="stylesheet"
            href="score-share.css"
        />
    </head>

    <body>
        <main class="score-card">
            <div
                id="score-loading"
                class="score-loading"
                role="status"
            >
                <div class="loading-spinner"></div>

                <p id="loading-text">
                    LOADING RAIDER PROFILE...
                </p>
            </div>

            <div
                id="profile-content"
                class="score-content"
                hidden
            >
                <p class="eyebrow">
                    THE YOUNG RAIDER
                </p>
                <div class="king-icon-frame">
                    <img
                        id="king-icon"
                        class="king-icon"
                        alt="Daily King"
                        hidden
                    />
                </div>
                <h1 id="player-name"></h1>

                <p
                    id="profile-title"
                    class="achievement"
                >
                    RAIDER RECORD
                </p>

                <div class="score-section">
                    <p
                        id="score-label"
                        class="score-label"
                    >
                        HIGHEST SCORE
                    </p>

                    <div
                        id="highest-score"
                        class="score-value"
                    ></div>
                </div>

                <div class="base-value">
                    <span id="base-label">
                        HIGHEST BASE
                    </span>:
                    <strong id="highest-base"></strong>
                </div>

                <div class="base-value">
                    GLOBAL RANK:
                    <strong id="global-rank"></strong>
                </div>

                <button id="play-button">
                    PLAY THE YOUNG RAIDER
                </button>

                <p
                    id="challenge-text"
                    class="status"
                >
                    CAN YOU BEAT THIS RAIDER?
                </p>
            </div>
        </main>

        <script
            type="module"
            src="profile-share.ts"
        ></script>
    </body>
</html>
