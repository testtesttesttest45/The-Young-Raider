<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />

        <title>Request gem</title>

        <link
            rel="stylesheet"
            href="gem-request.css"
        />
    </head>

    <body>
        <main class="request-card">
            <section
                id="loading-view"
                class="loading-view"
                role="status"
                aria-live="polite"
            >
                <div class="loading-spinner"></div>
                <p>LOADING GEM REQUEST...</p>
            </section>

            <section
                id="request-content"
                class="request-content"
                hidden
            >
                <div class="card-header">
                    <p class="eyebrow">
                        THE YOUNG RAIDER
                    </p>

                    <h1>
                        COMMUNITY GEM REQUEST
                    </h1>

                    <p
                        id="requester-name"
                        class="requester-name"
                    ></p>
                </div>

                <section class="hero-panel">
                    <div class="hero-coin-wrap">
                        <div class="hero-coin-glow"></div>

                        <img
                            class="hero-coin"
                            src="/assets/images/gem.png"
                            alt="gem"
                        />
                    </div>

                    <div class="hero-main">
                        <div class="top-stats">
                            <div class="stat-chip timer-chip">
                                <span class="chip-label">
                                    TIME LEFT
                                </span>

                                <strong id="countdown">
                                    05:00:00
                                </strong>
                            </div>

                            <div class="stat-chip received-chip">
                                <span class="chip-label">
                                    RECEIVED
                                </span>

                                <strong id="progress-value">
                                    0 / 10
                                </strong>
                            </div>
                        </div>

                        <div class="gem-summary">
                            <div class="gem-summary-label">
                            </div>

                            <div class="gem-summary-value">
                                <img
                                    class="gem-inline-icon"
                                    src="/assets/images/gem.png"
                                    alt="gem"
                                />

                                <span id="gem-collected">
                                    0 GEM COLLECTED
                                </span>
                            </div>
                        </div>

                        <div class="progress-track">
                            <div
                                id="progress-fill"
                                class="progress-fill"
                            ></div>
                        </div>

                        <button id="donate-button">
                            DONATE 1 gem
                        </button>

                        <p
                            id="status-text"
                            class="status-text"
                            aria-live="polite"
                        ></p>
                    </div>
                </section>

                <section class="supporters-panel">
                    <div class="supporters-header">
                        <h2>
                            SUPPORTERS
                        </h2>

                        <span class="supporters-subtitle">
                            COMMUNITY HELPERS
                        </span>
                    </div>

                    <div
                        id="donation-history"
                        class="donation-history"
                    ></div>
                </section>
            </section>
        </main>

        <script
            type="module"
            src="gem-request.ts"
        ></script>
    </body>
</html>
